name: Trigger Bangumi Update

on:
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if cache is valid'
        required: false
        default: 'true'
        type: boolean
      clear_cache:
        description: 'Clear all bangumi cache before update'
        required: false
        default: 'false'
        type: boolean
      skip_build:
        description: 'Skip website build and deploy'
        required: false
        default: 'false'
        type: boolean
      force_sync:
        description: 'Force sync latest cache into webpage data before deploy'
        required: false
        default: 'true'
        type: boolean

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Bangumi Update Workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: update-bangumi
          client-payload: |
            {
              "force_update": "${{ inputs.force_update }}",
              "clear_cache": "${{ inputs.clear_cache }}",
              "skip_build": "${{ inputs.skip_build }}",
              "force_sync": "${{ inputs.force_sync }}",
              "source": "manual-trigger"
            }

      - name: Log trigger
        run: |
          echo "✅ Bangumi update workflow triggered"
          echo "Force update: ${{ inputs.force_update }}"
          echo "Clear cache: ${{ inputs.clear_cache }}"
          echo "Skip build: ${{ inputs.skip_build }}"
          echo "Force sync: ${{ inputs.force_sync }}"
          echo ""
          echo "View progress at: ${{ github.server_url }}/${{ github.repository }}/actions"
