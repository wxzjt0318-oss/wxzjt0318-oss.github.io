name: Update Bangumi Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build and deploy (only update cache)'
        required: false
        default: 'false'
        type: boolean
      clear_cache:
        description: 'Clear all bangumi cache before update'
        required: false
        default: 'false'
        type: boolean
  repository_dispatch:
    types: [update-bangumi]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "bangumi-update"
  cancel-in-progress: true

env:
  BANGUMI_USER_ID: ${{ vars.BANGUMI_USER_ID || '1180323' }}
  CACHE_DIR: ".cache/bangumi"

jobs:
  update-bangumi-data:
    runs-on: ubuntu-latest
    outputs:
      anime_count: ${{ steps.fetch-anime.outputs.anime_count }}
      game_count: ${{ steps.fetch-games.outputs.game_count }}
      has_changes: ${{ steps.commit.outputs.has_changes }}
      cache_updated: ${{ steps.fetch-anime.outputs.cache_updated }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .cache/
            src/
            reports/
          sparse-checkout-cone-mode: false

      - name: Clear cache
        if: inputs.clear_cache == 'true'
        run: |
          rm -rf ${{ env.CACHE_DIR }}
          echo "Cache cleared"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Fetch Bangumi Anime Data
        id: fetch-anime
        run: |
          echo "Fetching Bangumi anime data for user: ${{ env.BANGUMI_USER_ID }}"
          mkdir -p ${{ env.CACHE_DIR }}

          ANIME_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://api.bgm.tv/v0/users/${{ env.BANGUMI_USER_ID }}/collections?subject_type=2&limit=500" \
            -H "Accept: application/json" \
            -H "Cache-Control: no-cache" \
            --connect-timeout 30 \
            --max-time 120)

          ANIME_CODE=$(echo "$ANIME_RESPONSE" | tail -1)
          ANIME_DATA=$(echo "$ANIME_RESPONSE" | sed '$d')

          if [ "$ANIME_CODE" = "200" ]; then
            echo "$ANIME_DATA" > ${{ env.CACHE_DIR }}/anime.json
            ANIME_COUNT=$(echo "$ANIME_DATA" | jq '.data | length' 2>/dev/null || echo "0")
            echo "anime_count=$ANIME_COUNT" >> $GITHUB_OUTPUT
            echo "cache_updated=true" >> $GITHUB_OUTPUT
            echo "✅ Fetched $ANIME_COUNT anime entries"
          else
            echo "anime_count=0" >> $GITHUB_OUTPUT
            echo "cache_updated=false" >> $GITHUB_OUTPUT
            echo "⚠️ Failed to fetch anime data (HTTP $ANIME_CODE)"
            exit 1
          fi

      - name: Fetch Bangumi Game Data
        id: fetch-games
        run: |
          echo "Fetching Bangumi game data for user: ${{ env.BANGUMI_USER_ID }}"

          GAME_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://api.bgm.tv/v0/users/${{ env.BANGUMI_USER_ID }}/collections?subject_type=4&limit=500" \
            -H "Accept: application/json" \
            -H "Cache-Control: no-cache" \
            --connect-timeout 30 \
            --max-time 120)

          GAME_CODE=$(echo "$GAME_RESPONSE" | tail -1)
          GAME_DATA=$(echo "$GAME_RESPONSE" | sed '$d')

          if [ "$GAME_CODE" = "200" ]; then
            echo "$GAME_DATA" > ${{ env.CACHE_DIR }}/games.json
            GAME_COUNT=$(echo "$GAME_DATA" | jq '.data | length' 2>/dev/null || echo "0")
            echo "game_count=$GAME_COUNT" >> $GITHUB_OUTPUT
            echo "✅ Fetched $GAME_COUNT game entries"
          else
            echo "game_count=0" >> $GITHUB_OUTPUT
            echo "⚠️ Failed to fetch game data (HTTP $GAME_CODE)"
          fi

      - name: Install dependencies and generate daily article
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run generate-bangumi-post
        env:
          BANGUMI_POSTS_PER_RUN: 1
          BANGUMI_POST_REVIEW_MODE: ${{ vars.BANGUMI_POST_REVIEW_MODE || 'false' }}

      - name: Commit changes
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add ${{ env.CACHE_DIR }} src/content/posts src/data/bangumi-posts-state.json reports/bangumi-daily-posts-latest.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            COMMIT_MSG="chore: update bangumi cache and daily anime post [skip ci]
            
Anime: ${{ steps.fetch-anime.outputs.anime_count }}
Games: ${{ steps.fetch-games.outputs.game_count }}
Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            git commit -m "$COMMIT_MSG"
            git push
            echo "✅ Changes committed and pushed"
          fi

  build-and-deploy:
    needs: update-bangumi-data
    if: needs.update-bangumi-data.outputs.has_changes == 'true' && inputs.skip_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build site
        run: pnpm run build
        env:
          UMAMI_SHARE_URL: ${{ secrets.UMAMI_SHARE_URL }}
          ENABLE_CONTENT_SYNC: false

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: [update-bangumi-data, build-and-deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Bangumi Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Anime Count | ${{ needs.update-bangumi-data.outputs.anime_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Game Count | ${{ needs.update-bangumi-data.outputs.game_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache Updated | ${{ needs.update-bangumi-data.outputs.cache_updated }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Changes Committed | ${{ needs.update-bangumi-data.outputs.has_changes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Triggered | ${{ needs.update-bangumi-data.outputs.has_changes == 'true' && inputs.skip_build != 'true' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger Type | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack - Success
        if: success() && needs.update-bangumi-data.outputs.cache_updated == 'true'
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ Bangumi Data Updated",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Bangumi Data Updated Successfully"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Anime Entries:*\n${{ needs.update-bangumi-data.outputs.anime_count }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Game Entries:*\n${{ needs.update-bangumi-data.outputs.game_count }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Build Triggered:*\n${{ needs.update-bangumi-data.outputs.has_changes == 'true' && inputs.skip_build != 'true' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Run Number:*\n#${{ github.run_number }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Site"
                      },
                      "url": "https://lm520.cc/anime/"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
