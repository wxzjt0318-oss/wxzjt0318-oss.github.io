name: Update Bangumi Data

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build and deploy (only update cache)'
        required: false
        default: 'false'
        type: boolean
      clear_cache:
        description: 'Clear all bangumi cache before update'
        required: false
        default: 'false'
        type: boolean
      force_sync:
        description: 'Force sync cache to page data and deploy website'
        required: false
        default: 'true'
        type: boolean
  repository_dispatch:
    types: [update-bangumi]

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: "bangumi-update"
  cancel-in-progress: true

env:
  BANGUMI_USER_ID: ${{ vars.BANGUMI_USER_ID || '1180323' }}
  CACHE_DIR: ".cache/bangumi"
  TZ: "Asia/Shanghai"

jobs:
  update-bangumi-data:
    runs-on: ubuntu-latest
    outputs:
      anime_count: ${{ steps.fetch-anime.outputs.anime_count }}
      game_count: ${{ steps.fetch-games.outputs.game_count }}
      has_changes: ${{ steps.commit.outputs.has_changes }}
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
      cache_updated: ${{ steps.fetch-anime.outputs.cache_updated }}
      execution_time: ${{ steps.log-completion.outputs.execution_time }}
      error_message: ${{ steps.handle-error.outputs.error_message || 'none' }}
    steps:
      - name: Log Execution Start
        id: log-execution
        run: |
          echo "========================================" | tee -a $GITHUB_STEP_SUMMARY
          echo "📅 Bangumi Update Workflow Started" | tee -a $GITHUB_STEP_SUMMARY
          echo "========================================" | tee -a $GITHUB_STEP_SUMMARY
          echo "" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" | tee -a $GITHUB_STEP_SUMMARY
          echo "|------|-------|" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Trigger Type | ${{ github.event_name }} |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| User ID | ${{ env.BANGUMI_USER_ID }} |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Scheduled Time | ${{ github.event.schedule }} |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Run ID | #${{ github.run_number }} |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Start Time | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Timezone | ${{ env.TZ }} |" | tee -a $GITHUB_STEP_SUMMARY
          echo "" | tee -a $GITHUB_STEP_SUMMARY
          START_TIME=$(date +%s)

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Clear cache
        if: (github.event_name == 'workflow_dispatch' && inputs.clear_cache == true) || (github.event_name == 'repository_dispatch' && github.event.client_payload.clear_cache == 'true')
        run: |
          echo "🗑️ Clearing cache directory..."
          rm -rf ${{ env.CACHE_DIR }}
          mkdir -p ${{ env.CACHE_DIR }}
          echo "✅ Cache cleared"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Verify/Update Bangumi Cache Directory
        run: |
          if [ ! -d "${{ env.CACHE_DIR }}" ]; then
            echo "📁 Creating cache directory..."
            mkdir -p ${{ env.CACHE_DIR }}
          else
            echo "📁 Cache directory exists"
            ls -la ${{ env.CACHE_DIR }}
          fi

      - name: Fetch Bangumi Anime Data
        id: fetch-anime
        run: |
          echo "========================================"
          echo "📡 Fetching Bangumi Anime Data"
          echo "========================================"
          echo "User ID: ${{ env.BANGUMI_USER_ID }}"
          echo "API Endpoint: https://api.bgm.tv/v0/users/${{ env.BANGUMI_USER_ID }}/collections"
          echo "Subject Type: anime (2)"
          echo ""

          mkdir -p ${{ env.CACHE_DIR }}

          fetch_collections_page() {
            local subject_type="$1"
            local offset="$2"
            curl -sS \
              "https://api.bgm.tv/v0/users/${{ env.BANGUMI_USER_ID }}/collections?subject_type=${subject_type}&limit=100&offset=${offset}" \
              -H "Accept: application/json" \
              -H "User-Agent: wxzjt0318-oss-bangumi-daily-posts/1.0" \
              -H "Cache-Control: no-cache" \
              --connect-timeout 30 \
              --max-time 120 \
              -w "\n%{http_code}"
          }

          ANIME_TMP=$(mktemp)
          echo '{"data":[]}' > "$ANIME_TMP"
          ANIME_OFFSET=0
          ANIME_TOTAL=0

          while true; do
            echo "➡️ Fetching anime page with offset=$ANIME_OFFSET limit=100"
            ANIME_RESPONSE=$(fetch_collections_page 2 "$ANIME_OFFSET")
            ANIME_CODE=$(echo "$ANIME_RESPONSE" | tail -1)
            ANIME_DATA=$(echo "$ANIME_RESPONSE" | sed '$d')

            echo "HTTP Status Code: $ANIME_CODE"

            if [ "$ANIME_CODE" = "429" ]; then
              echo "⚠️ Rate limited by Bangumi API"
              echo "anime_count=0" >> $GITHUB_OUTPUT
              echo "cache_updated=false" >> $GITHUB_OUTPUT
              echo "::error::Rate limited by Bangumi API. Please try again later."
              exit 1
            fi

            if [ "$ANIME_CODE" != "200" ]; then
              echo "❌ Failed to fetch anime data (HTTP $ANIME_CODE)"
              echo "anime_count=0" >> $GITHUB_OUTPUT
              echo "cache_updated=false" >> $GITHUB_OUTPUT
              echo "::error::Failed to fetch Bangumi anime data with HTTP status $ANIME_CODE at offset $ANIME_OFFSET"
              exit 1
            fi

            if ! echo "$ANIME_DATA" | jq -e '.data and (.data | type == "array")' > /dev/null 2>&1; then
              echo "❌ Response JSON format is invalid"
              echo "Response preview: $(echo "$ANIME_DATA" | head -c 200)"
              echo "anime_count=0" >> $GITHUB_OUTPUT
              echo "cache_updated=false" >> $GITHUB_OUTPUT
              exit 1
            fi

            PAGE_COUNT=$(echo "$ANIME_DATA" | jq '.data | length')
            ANIME_TOTAL=$((ANIME_TOTAL + PAGE_COUNT))
            jq -s '{data: (.[0].data + .[1].data)}' "$ANIME_TMP" <(echo "$ANIME_DATA") > "$ANIME_TMP.next"
            mv "$ANIME_TMP.next" "$ANIME_TMP"

            if [ "$PAGE_COUNT" -lt 100 ]; then
              break
            fi

            ANIME_OFFSET=$((ANIME_OFFSET + 100))
          done

          mv "$ANIME_TMP" ${{ env.CACHE_DIR }}/anime.json
          CACHE_DATE=$(jq -r '.date // empty' ${{ env.CACHE_DIR }}/anime.json 2>/dev/null || echo "")
          echo "✅ Successfully fetched $ANIME_TOTAL anime entries"
          [ -n "$CACHE_DATE" ] && echo "Cache Date: $CACHE_DATE"
          echo "anime_count=$ANIME_TOTAL" >> $GITHUB_OUTPUT
          echo "cache_updated=true" >> $GITHUB_OUTPUT

      - name: Fetch Bangumi Game Data
        id: fetch-games
        run: |
          echo ""
          echo "========================================"
          echo "📡 Fetching Bangumi Game Data"
          echo "========================================"
          echo "User ID: ${{ env.BANGUMI_USER_ID }}"
          echo "Subject Type: game (4)"
          echo ""

          fetch_collections_page() {
            local subject_type="$1"
            local offset="$2"
            curl -sS \
              "https://api.bgm.tv/v0/users/${{ env.BANGUMI_USER_ID }}/collections?subject_type=${subject_type}&limit=100&offset=${offset}" \
              -H "Accept: application/json" \
              -H "User-Agent: wxzjt0318-oss-bangumi-daily-posts/1.0" \
              -H "Cache-Control: no-cache" \
              --connect-timeout 30 \
              --max-time 120 \
              -w "\n%{http_code}"
          }

          GAME_TMP=$(mktemp)
          echo '{"data":[]}' > "$GAME_TMP"
          GAME_OFFSET=0
          GAME_TOTAL=0

          while true; do
            echo "➡️ Fetching game page with offset=$GAME_OFFSET limit=100"
            GAME_RESPONSE=$(fetch_collections_page 4 "$GAME_OFFSET")
            GAME_CODE=$(echo "$GAME_RESPONSE" | tail -1)
            GAME_DATA=$(echo "$GAME_RESPONSE" | sed '$d')

            echo "HTTP Status Code: $GAME_CODE"

            if [ "$GAME_CODE" = "429" ]; then
              echo "⚠️ Rate limited by Bangumi API"
              echo "game_count=0" >> $GITHUB_OUTPUT
              exit 1
            fi

            if [ "$GAME_CODE" != "200" ]; then
              echo "⚠️ Failed to fetch game data (HTTP $GAME_CODE)"
              echo "game_count=0" >> $GITHUB_OUTPUT
              exit 1
            fi

            if ! echo "$GAME_DATA" | jq -e '.data and (.data | type == "array")' > /dev/null 2>&1; then
              echo "⚠️ Response JSON format is invalid or empty"
              echo "game_count=0" >> $GITHUB_OUTPUT
              exit 1
            fi

            PAGE_COUNT=$(echo "$GAME_DATA" | jq '.data | length')
            GAME_TOTAL=$((GAME_TOTAL + PAGE_COUNT))
            jq -s '{data: (.[0].data + .[1].data)}' "$GAME_TMP" <(echo "$GAME_DATA") > "$GAME_TMP.next"
            mv "$GAME_TMP.next" "$GAME_TMP"

            if [ "$PAGE_COUNT" -lt 100 ]; then
              break
            fi

            GAME_OFFSET=$((GAME_OFFSET + 100))
          done

          mv "$GAME_TMP" ${{ env.CACHE_DIR }}/games.json
          echo "✅ Successfully fetched $GAME_TOTAL game entries"
          echo "game_count=$GAME_TOTAL" >> $GITHUB_OUTPUT

      - name: Verify Cache Files
        run: |
          echo ""
          echo "========================================"
          echo "🔍 Verifying Cache Files"
          echo "========================================"

          if [ -f "${{ env.CACHE_DIR }}/anime.json" ]; then
            ANIME_SIZE=$(wc -c < "${{ env.CACHE_DIR }}/anime.json")
            echo "✅ anime.json exists ($ANIME_SIZE bytes)"
          else
            echo "❌ anime.json not found"
          fi

          if [ -f "${{ env.CACHE_DIR }}/games.json" ]; then
            GAME_SIZE=$(wc -c < "${{ env.CACHE_DIR }}/games.json")
            echo "✅ games.json exists ($GAME_SIZE bytes)"
          else
            echo "⚠️ games.json not found (optional)"
          fi

      - name: Sync Bangumi Anime Data File
        id: sync-bangumi
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.force_sync == true) || (github.event_name == 'repository_dispatch' && github.event.client_payload.force_sync != 'false')
        run: |
          echo ""
          echo "========================================"
          echo "🔄 Syncing Bangumi Anime Data File"
          echo "========================================"
          pnpm sync-bangumi-cache

          SYNC_COUNT=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('src/data/bangumi-data.json','utf8')); process.stdout.write(String(Array.isArray(data)?data.length:0));")
          SYNC_UPDATED_AT=$(node -e "const fs=require('fs'); const stat=fs.statSync('src/data/bangumi-data.json'); process.stdout.write(new Date(stat.mtimeMs).toISOString());")
          STATUS_STATS=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('src/data/bangumi-data.json','utf8')); const stats={watching:0,completed:0,planned:0,onhold:0,dropped:0}; for (const item of Array.isArray(data)?data:[]) { if (item && stats[item.status] !== undefined) stats[item.status]++; } process.stdout.write(JSON.stringify(stats));")
          echo "sync_executed=true" >> $GITHUB_OUTPUT
          echo "sync_count=$SYNC_COUNT" >> $GITHUB_OUTPUT
          echo "sync_updated_at=$SYNC_UPDATED_AT" >> $GITHUB_OUTPUT
          echo "status_stats=$STATUS_STATS" >> $GITHUB_OUTPUT

      - name: Install dependencies and generate daily article
        run: |
          echo ""
          echo "========================================"
          echo "📝 Installing Dependencies & Generating Article"
          echo "========================================"

          pnpm install --no-frozen-lockfile

          echo "Running: pnpm generate-bangumi-post"
          pnpm generate-bangumi-post
        env:
          BANGUMI_POSTS_PER_RUN: 1
          BANGUMI_POST_REVIEW_MODE: ${{ vars.BANGUMI_POST_REVIEW_MODE || 'false' }}

      - name: Verify Generated Content
        run: |
          echo ""
          echo "========================================"
          echo "🔍 Verifying Generated Content"
          echo "========================================"

          if [ -f "reports/bangumi-daily-posts-latest.json" ]; then
            REPORT_SIZE=$(wc -c < "reports/bangumi-daily-posts-latest.json")
            echo "✅ Report exists ($REPORT_SIZE bytes)"

            SELECTED_TITLE=$(jq -r '.selectedAnime.subject.name_cn // .selectedAnime.subject.name // "N/A"' reports/bangumi-daily-posts-latest.json 2>/dev/null || echo "N/A")
            echo "📌 Selected Anime: $SELECTED_TITLE"
          else
            echo "⚠️ Report not found"
          fi

          if ls src/content/posts/*.md 1> /dev/null 2>&3; then
            POST_COUNT=$(ls -1 src/content/posts/*.md 2>/dev/null | wc -l)
            echo "✅ Found $POST_COUNT markdown posts"
          else
            echo "⚠️ No posts generated"
          fi

      - name: Commit changes
        id: commit
        run: |
          echo ""
          echo "========================================"
          echo "📤 Committing Changes"
          echo "========================================"

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add ${{ env.CACHE_DIR }} src/content/posts src/data/bangumi-data.json src/data/bangumi-posts-state.json reports/bangumi-daily-posts-latest.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "commit_sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes to commit (cache may already be up to date)"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git commit -m "chore: update bangumi cache and daily anime post"
            git push origin HEAD:main
            COMMIT_SHA=$(git rev-parse HEAD)
            echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
            echo "✅ Changes committed and pushed"
            echo "📌 Pushed commit: $COMMIT_SHA"
          fi

      - name: Trigger Deploy Workflow
        if: steps.commit.outputs.has_changes == 'true'
        run: |
          echo ""
          echo "========================================"
          echo "🚀 Triggering Deploy Workflow"
          echo "========================================"
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type":"deploy","client_payload":{"source":"bangumi-update","commit_sha":"${{ steps.commit.outputs.commit_sha }}"}}'
          echo "✅ Deploy dispatch sent"

      - name: Log Execution Completion
        id: log-completion
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "execution_time=${DURATION}s" >> $GITHUB_OUTPUT
          FETCH_COUNT="${{ steps.fetch-anime.outputs.anime_count || '0' }}"
          SYNC_COUNT="${{ steps.sync-bangumi.outputs.sync_count || '0' }}"
          SYNC_EXECUTED="${{ steps.sync-bangumi.outputs.sync_executed || 'false' }}"
          STATUS_STATS='${{ steps.sync-bangumi.outputs.status_stats || '{"watching":0,"completed":0,"planned":0,"onhold":0,"dropped":0}' }}'
          WATCHING_COUNT=$(node -e "const stats = JSON.parse(process.argv[1]); process.stdout.write(String(stats.watching ?? 0));" "$STATUS_STATS")
          COMPLETED_COUNT=$(node -e "const stats = JSON.parse(process.argv[1]); process.stdout.write(String(stats.completed ?? 0));" "$STATUS_STATS")
          PLANNED_COUNT=$(node -e "const stats = JSON.parse(process.argv[1]); process.stdout.write(String(stats.planned ?? 0));" "$STATUS_STATS")
          ONHOLD_COUNT=$(node -e "const stats = JSON.parse(process.argv[1]); process.stdout.write(String(stats.onhold ?? 0));" "$STATUS_STATS")
          DROPPED_COUNT=$(node -e "const stats = JSON.parse(process.argv[1]); process.stdout.write(String(stats.dropped ?? 0));" "$STATUS_STATS")
          SYNC_WARNING="none"
          SYNC_ACTION="none"
          if [ "$SYNC_EXECUTED" = "true" ] && [ "$FETCH_COUNT" != "$SYNC_COUNT" ]; then
            SYNC_WARNING="warning: fetched anime count does not match synced page-data count"
            SYNC_ACTION="re-run workflow with clear_cache=true and force_sync=true, then verify src/data/bangumi-data.json"
          fi
          echo "" | tee -a $GITHUB_STEP_SUMMARY
          echo "========================================" | tee -a $GITHUB_STEP_SUMMARY
          echo "✅ Bangumi Update Workflow Completed" | tee -a $GITHUB_STEP_SUMMARY
          echo "========================================" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" | tee -a $GITHUB_STEP_SUMMARY
          echo "|------|-------|" | tee -a $GITHUB_STEP_SUMMARY
          echo "| End Time | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Duration | ${DURATION}s |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Anime Count | $FETCH_COUNT |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Game Count | ${{ steps.fetch-games.outputs.game_count }} |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Cache Updated | ${{ steps.fetch-anime.outputs.cache_updated }} |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Sync Executed | $SYNC_EXECUTED |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Synced Anime Count | $SYNC_COUNT |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Page Data Updated At | ${{ steps.sync-bangumi.outputs.sync_updated_at || 'not-synced' }} |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Status Watching | $WATCHING_COUNT |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Status Completed | $COMPLETED_COUNT |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Status Planned | $PLANNED_COUNT |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Status On Hold | $ONHOLD_COUNT |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Status Dropped | $DROPPED_COUNT |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Sync Count Check | $SYNC_WARNING |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Suggested Action | $SYNC_ACTION |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Changes Committed | ${{ steps.commit.outputs.has_changes }} |" | tee -a $GITHUB_STEP_SUMMARY

      - name: Validate Sync Count Consistency
        if: steps.sync-bangumi.outputs.sync_executed == 'true'
        run: |
          FETCH_COUNT="${{ steps.fetch-anime.outputs.anime_count || '0' }}"
          SYNC_COUNT="${{ steps.sync-bangumi.outputs.sync_count || '0' }}"
          if [ "$FETCH_COUNT" != "$SYNC_COUNT" ]; then
            echo "❌ Sync count mismatch detected"
            echo "Fetched anime count: $FETCH_COUNT"
            echo "Synced page-data count: $SYNC_COUNT"
            echo "Suggested action: re-run workflow with clear_cache=true and force_sync=true"
            exit 1
          fi
          echo "✅ Sync count consistency check passed"

      - name: Handle Errors
        id: handle-error
        if: failure()
        run: |
          echo ""
          echo "========================================"
          echo "❌ Workflow Failed - Error Handling"
          echo "========================================"
          echo "::error title=Bangumi Update Failed::The workflow encountered an error"
          echo "error_message=Workflow failed during data fetch, sync, validation, or deployment" >> $GITHUB_OUTPUT

      - name: Log Final Status
        if: always()
        run: |
          FINAL_STATUS="Success"
          if [ "${{ job.status }}" != "success" ]; then
            FINAL_STATUS="Failed"
          fi
          echo ""
          echo "========================================"
          echo "📊 Final Status: $FINAL_STATUS"
          echo "========================================"
          echo "| Item | Value |" | tee -a $GITHUB_STEP_SUMMARY
          echo "|------|-------|" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Job Status | ${{ job.status }} |" | tee -a $GITHUB_STEP_SUMMARY
          echo "| Final Status | $FINAL_STATUS |" | tee -a $GITHUB_STEP_SUMMARY

  notify:
    needs: update-bangumi-data
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Notification Data
        id: notify-data
        run: |
          FINAL_STATUS="Success"
          if [ "${{ needs.update-bangumi-data.outputs.cache_updated }}" != "true" ]; then
            FINAL_STATUS="Partial"
          fi
          if [ "${{ job.status }}" != "success" ]; then
            FINAL_STATUS="Failed"
          fi
          echo "final_status=$FINAL_STATUS" >> $GITHUB_OUTPUT

      - name: Notify Slack - Success
        if: success() && needs.update-bangumi-data.outputs.cache_updated == 'true'
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ Bangumi Data Updated",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Bangumi Update Successful"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Anime Entries:*\n${{ needs.update-bangumi-data.outputs.anime_count }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Game Entries:*\n${{ needs.update-bangumi-data.outputs.game_count }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Trigger:*\n${{ github.event_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Run:*\n#${{ github.run_number }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "🌐 View Site"
                      },
                      "url": "https://lm520.cc/anime/"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "📊 View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack - Failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ Bangumi Update Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Bangumi Update Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Failed Step:*\n${{ needs.update-bangumi-data.outputs.error_message }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Trigger:*\n${{ github.event_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Run:*\n#${{ github.run_number }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Error Time:*\n$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "🔧 View Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Generate Final Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "========================================" >> $GITHUB_STEP_SUMMARY
          echo "📋 Notification Summary" >> $GITHUB_STEP_SUMMARY
          echo "========================================" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Job Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Notification Sent | ${{ needs.update-bangumi-data.outputs.cache_updated == 'true' && 'Success' || (job.status == 'success' && 'Partial' || 'Failure') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slack Notified | ${{ secrets.SLACK_WEBHOOK_URL && 'Yes' || 'No (not configured)' }} |" >> $GITHUB_STEP_SUMMARY
