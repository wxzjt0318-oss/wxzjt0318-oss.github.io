name: Update Bangumi Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if cache is valid'
        required: false
        default: 'false'
        type: boolean
      clear_cache:
        description: 'Clear all bangumi cache before update'
        required: false
        default: 'false'
        type: boolean
  repository_dispatch:
    types: [update-bangumi]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "bangumi-update"
  cancel-in-progress: false

env:
  BANGUMI_USER_ID: "1180323"
  CACHE_DIR: ".cache/bangumi"

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      anime_count: ${{ steps.fetch.outputs.anime_count }}
      game_count: ${{ steps.fetch.outputs.game_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Check cache status
        id: check
        run: |
          if [ "${{ inputs.clear_cache }}" = "true" ]; then
            echo "Clearing cache..."
            rm -rf ${{ env.CACHE_DIR }}
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "Cache cleared, forcing update."
            exit 0
          fi

          if [ "${{ inputs.force_update }}" = "true" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "Force update requested."
            exit 0
          fi

          if [ -d "${{ env.CACHE_DIR }}" ]; then
            LATEST_CACHE=$(find ${{ env.CACHE_DIR }} -name "*.json" -type f -printf '%T@ %p\n' 2>/dev/null | sort -n | tail -1 | cut -d' ' -f2-)
            if [ -n "$LATEST_CACHE" ]; then
              CACHE_AGE=$(( $(date +%s) - $(stat -c %Y "$LATEST_CACHE" 2>/dev/null || stat -f %m "$LATEST_CACHE") ))
              CACHE_AGE_HOURS=$(( CACHE_AGE / 3600 ))
              echo "Latest cache age: ${CACHE_AGE_HOURS} hours"
              
              if [ $CACHE_AGE_HOURS -lt 24 ]; then
                echo "needs_update=false" >> $GITHUB_OUTPUT
                echo "Cache is fresh (${CACHE_AGE_HOURS}h < 24h), skipping update."
                exit 0
              fi
            fi
          fi
          
          echo "needs_update=true" >> $GITHUB_OUTPUT
          echo "Cache is stale or missing, update needed."

      - name: Install dependencies
        if: steps.check.outputs.needs_update == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Fetch Bangumi data
        id: fetch
        if: steps.check.outputs.needs_update == 'true'
        run: |
          echo "Fetching Bangumi data for user: ${{ env.BANGUMI_USER_ID }}"
          
          mkdir -p ${{ env.CACHE_DIR }}
          
          ANIME_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://api.bgm.tv/v0/users/${{ env.BANGUMI_USER_ID }}/collections?subject_type=2&limit=500" \
            -H "Accept: application/json" \
            --connect-timeout 30 \
            --max-time 120)
          
          ANIME_CODE=$(echo "$ANIME_RESPONSE" | tail -1)
          ANIME_DATA=$(echo "$ANIME_RESPONSE" | sed '$d')
          
          if [ "$ANIME_CODE" = "200" ]; then
            echo "$ANIME_DATA" > ${{ env.CACHE_DIR }}/anime.json
            ANIME_COUNT=$(echo "$ANIME_DATA" | jq '.data | length' 2>/dev/null || echo "0")
            echo "anime_count=$ANIME_COUNT" >> $GITHUB_OUTPUT
            echo "✅ Fetched $ANIME_COUNT anime entries"
          else
            echo "anime_count=0" >> $GITHUB_OUTPUT
            echo "⚠️ Failed to fetch anime data (HTTP $ANIME_CODE)"
          fi
          
          GAME_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://api.bgm.tv/v0/users/${{ env.BANGUMI_USER_ID }}/collections?subject_type=4&limit=500" \
            -H "Accept: application/json" \
            --connect-timeout 30 \
            --max-time 120)
          
          GAME_CODE=$(echo "$GAME_RESPONSE" | tail -1)
          GAME_DATA=$(echo "$GAME_RESPONSE" | sed '$d')
          
          if [ "$GAME_CODE" = "200" ]; then
            echo "$GAME_DATA" > ${{ env.CACHE_DIR }}/games.json
            GAME_COUNT=$(echo "$GAME_DATA" | jq '.data | length' 2>/dev/null || echo "0")
            echo "game_count=$GAME_COUNT" >> $GITHUB_OUTPUT
            echo "✅ Fetched $GAME_COUNT game entries"
          else
            echo "game_count=0" >> $GITHUB_OUTPUT
            echo "⚠️ Failed to fetch game data (HTTP $GAME_CODE)"
          fi
          
          echo "cache_timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Generate daily Bangumi article
        if: steps.check.outputs.needs_update == 'true'
        run: pnpm run generate-bangumi-post
        env:
          BANGUMI_POSTS_PER_RUN: 1
          BANGUMI_POST_REVIEW_MODE: ${{ vars.BANGUMI_POST_REVIEW_MODE || 'false' }}

      - name: Commit cache update
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -d "${{ env.CACHE_DIR }}" ]; then
            git add ${{ env.CACHE_DIR }} || true
            git add src/content/posts src/data/bangumi-posts-state.json reports/bangumi-daily-posts-latest.json || true
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              COMMIT_MSG="chore: update bangumi cache and daily anime post [skip ci] - Anime: ${{ steps.fetch.outputs.anime_count }}, Games: ${{ steps.fetch.outputs.game_count }}"
              git commit -m "$COMMIT_MSG"
              git push
              echo "Cache committed and pushed"
            fi
          fi

  build-and-deploy:
    needs: check-and-update
    if: needs.check-and-update.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build site
        run: pnpm run build
        env:
          UMAMI_SHARE_URL: ${{ secrets.UMAMI_SHARE_URL }}
          ENABLE_CONTENT_SYNC: false

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-success:
    needs: [check-and-update, build-and-deploy]
    if: success() && needs.check-and-update.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack - Success
        if: ${{ vars.ENABLE_SLACK_NOTIFY == 'true' }}
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ Bangumi Data Updated",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Bangumi Data Updated Successfully"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Anime Entries:*\n${{ needs.check-and-update.outputs.anime_count }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Game Entries:*\n${{ needs.check-and-update.outputs.game_count }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Trigger:*\n${{ github.event_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Run Number:*\n#${{ github.run_number }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Site"
                      },
                      "url": "https://lm520.cc/anime/"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Discord - Success
        if: ${{ vars.ENABLE_DISCORD_NOTIFY == 'true' }}
        continue-on-error: true
        uses: Ilshidur/action-discord@0.3.2
        with:
          args: "✅ **Bangumi Data Updated**\n📺 Anime: ${{ needs.check-and-update.outputs.anime_count }} entries\n🎮 Games: ${{ needs.check-and-update.outputs.game_count }} entries\n🔗 [View Site](https://lm520.cc/anime/) | [Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}

  notify-failure:
    needs: [check-and-update, build-and-deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack - Failure
        if: ${{ vars.ENABLE_SLACK_NOTIFY == 'true' }}
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ Bangumi Update Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Bangumi Data Update Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Run Number:*\n#${{ github.run_number }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Discord - Failure
        if: ${{ vars.ENABLE_DISCORD_NOTIFY == 'true' }}
        continue-on-error: true
        uses: Ilshidur/action-discord@0.3.2
        with:
          args: "❌ **Bangumi Data Update Failed**\n📦 Repository: ${{ github.repository }}\n🔢 Run: #${{ github.run_number }}\n🔗 [View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}

  skip-notify:
    needs: check-and-update
    if: needs.check-and-update.outputs.needs_update == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Log skip reason
        run: |
          echo "ℹ️ Bangumi data update skipped - cache is fresh (less than 24 hours old)"
          echo "To force an update, use the 'workflow_dispatch' trigger with force_update=true"
